name: Publish to PSGallery

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish Module
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to PSGallery
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          Publish-Module -Path ".\MDEValidator" -NuGetApiKey $env:NUGET_API_KEY -Verbose
